name: test
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm test
      - name: Test Hook mode
        run: |
          if [ -f test/hook/index.js ]; then
            node test/hook/index.js
          else
            echo "Hook tests not yet implemented, skipping"
          fi
